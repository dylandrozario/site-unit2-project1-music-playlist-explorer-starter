<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Music Playlist Explorer</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Sticky Header -->
    <header class="header">
        <div class="header-container">
            <h1 class="header-wordmark">Music Playlist Explorer</h1>

            <nav class="header-nav">
                <a href="#" class="header-nav-link header-nav-link--active">All Playlists</a>
                <span class="header-nav-separator">·</span>
                <a href="#" class="header-nav-link">Featured</a>
            </nav>

            <input type="search" class="header-search" placeholder="Search playlists..." aria-label="Search playlists">
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="main">
        <div class="playlist-cards" id="playlistCards">
            <!-- Sample hard-coded playlist cards -->
            
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer-text">&copy; 2026 Music Playlist Explorer</p>
    </footer>

    <!-- Modal Overlay (hidden by default) - clicking this backdrop closes the modal -->
    <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
        <div class="modal-content" role="dialog" aria-modal="true">
            <button class="modal-close" aria-label="Close modal">&times;</button>

            <div class="modal-header">
                <img src="./assets/song-cover.jpg" alt="Playlist cover" class="modal-cover">
                <div class="modal-info">
                    <h2 class="modal-name">Playlist Title</h2>
                    <p class="modal-author">Creator Name</p>
                </div>
            </div>

            <button class="modal-shuffle-btn">Shuffle Songs</button>

            <ul class="modal-song-list">
                <li class="modal-song-item">
                    <img src="" alt="Song cover" class="modal-song-cover">
                    <div class="modal-song-info">
                        <p class="modal-song-title">Song Title</p>
                        <p class="modal-song-artist">Artist Name</p>
                        <p class="modal-song-album">Album Name</p>
                    </div>
                    <span class="modal-song-duration">3:45</span>
                </li>
                <li class="modal-song-item">
                    <img src="./assets/song-cover.jpg" alt="Song cover" class="modal-song-cover">
                    <div class="modal-song-info">
                        <p class="modal-song-title">Another Song</p>
                        <p class="modal-song-artist">Artist Name</p>
                        <p class="modal-song-album">Album Name</p>
                    </div>
                    <span class="modal-song-duration">4:12</span>
                </li>
                <li class="modal-song-item">
                    <img src="https://picsum.photos/60/60?random=12" alt="Song cover" class="modal-song-cover">
                    <div class="modal-song-info">
                        <p class="modal-song-title">Third Track</p>
                        <p class="modal-song-artist">Artist Name</p>
                        <p class="modal-song-album">Album Name</p>
                    </div>
                    <span class="modal-song-duration">2:58</span>
                </li>
            </ul>
        </div>
    </div>

    <script src="data/data.json"></script>
    <script src="secrets.js"></script>
    <script src="script.js"></script>
</body>
</html>
